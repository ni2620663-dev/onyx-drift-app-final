<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">

    <title>OnyxDrift | Your AI-Powered Digital Soul</title>
    <meta name="description" content="OnyxDrift is a next-gen social network with AI Twins, Neural Video Editing, and Digital Memory. Preserve your legacy forever.">
    <meta name="keywords" content="AI Social Media, AI Twin, Video Editor, Digital Legacy, Neural Network">
    
    <meta property="og:title" content="OnyxDrift - Digital Soul Network">
    <meta property="og:description" content="Join the first-ever social network where your AI Twin lives for you.">
    <meta property="og:image" content="/preview-image.jpg"> <meta property="og:url" content="https://www.onyx-drift.com">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <style>
      /* Smooth Scrolling and Custom Scrollbar for Premium Feel */
      * {
        scrollbar-width: thin;
        scrollbar-color: #3b82f6 #0a0a0a;
        -webkit-tap-highlight-color: transparent;
      }
      body {
        margin: 0;
        background-color: #0a0a0a; /* App Background */
        overflow-x: hidden;
        font-family: 'Inter', sans-serif;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3b82f6;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(err => {
            console.log('SW registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
