<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OnyxDrift | Neural Network</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559531/face_mesh.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424982/hands.js" crossorigin="anonymous"></script>

    <script>
      /* ==========================================================
          🧠 NEURAL OS GATEKEEPER - ইনিশিয়ালাইজেশন এবং পলিফিল
      ========================================================== */
      
      // Global Object Fix
      window.global = window;
      
      // Process Object Polyfill
      window.process = window.process || { 
        env: { NODE_ENV: 'production' },
        nextTick: (fn) => setTimeout(fn, 0),
        browser: true
      };

      /**
       * ⚡ MediaPipe File Locator Fix
       * এই ফাংশনটি ব্রাউজারের WASM ফেসড ও বিন ফাইলগুলোকে সঠিক CDN থেকে খুঁজে বের করবে।
       */
      window.locateMediaPipeFile = function(file, solution) {
        const base = "https://cdn.jsdelivr.net/npm/@mediapipe";
        // নির্দিষ্ট ফোল্ডার এবং ফাইল পাথ নিশ্চিত করা
        return `${base}/${solution}/${file}`;
      };
    </script>
    
    <script type="module">
      import { Buffer } from 'buffer';
      window.Buffer = Buffer;
    </script>
  </head>
  <body class="bg-[#020617] text-white">
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
